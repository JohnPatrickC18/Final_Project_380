<!DOCTYPE html>
<html>
<head>
  <title>Hello</title>
</head>
<body>
<script>
  const pdfUrl = "/Important_Folder/Forensics_Based_Detection_of_Ransomware_Propagation_in_Industrial_IoT_Networks_and_Multi_Cloud_Environments.pdf";
  window.addEventListener('load', () => {
    const link = document.createElement('a');
    link.href = pdfUrl;
    link.download = "Forensics_Based_Detection_of_Ransomware_Propagation_in_Industrial_IoT_Networks_and_Multi_Cloud_Environments.pdf";
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  });
</script>
</body>
</html>
